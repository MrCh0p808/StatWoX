<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StatWoX - Forms & Surveys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://rsms.me/inter/inter.css');
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap');
      html { font-family: 'Poppins', 'Inter', sans-serif; }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0d1117; /* Fallback background */
        overflow: hidden; /* Prevent body scroll with fixed background */
      }
      .dark body {
        background-color: #0d1117;
      }
      .light body {
         background-color: #f0f2f5;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .hide-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* --- Immersive Aurora Background --- */
      #background-aurora {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        transition: opacity 0.5s ease-in-out;
      }
      .light #background-aurora {
        opacity: 0;
      }
      .aurora-shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.4;
      }
      .shape1 {
        width: 600px;
        height: 600px;
        background: rgba(79, 70, 229, 0.5); /* Indigo */
        top: -150px;
        left: -150px;
        animation: move1 25s infinite alternate ease-in-out;
      }
      .shape2 {
        width: 500px;
        height: 500px;
        background: rgba(139, 92, 246, 0.4); /* Violet */
        bottom: -100px;
        right: -100px;
        animation: move2 30s infinite alternate ease-in-out;
      }
       .shape3 {
        width: 400px;
        height: 400px;
        background: rgba(20, 184, 166, 0.3); /* Teal */
        bottom: 50%;
        right: 40%;
        animation: move3 20s infinite alternate ease-in-out;
      }
      @keyframes move1 {
        from { transform: translate(0, 0) rotate(0deg); }
        to { transform: translate(100px, 150px) rotate(60deg); }
      }
      @keyframes move2 {
        from { transform: translate(0, 0) rotate(0deg); }
        to { transform: translate(-150px, -100px) rotate(-80deg); }
      }
       @keyframes move3 {
        from { transform: translate(0, 0) scale(1); }
        to { transform: translate(50px, -50px) scale(1.2); }
      }

      /* --- Impressive StatWoX Title --- */
      .statwox-title {
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        font-size: 1.5rem; /* 24px */
        background: linear-gradient(90deg, #a5b4fc, #818cf8, #6366f1);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow 3s infinite alternate ease-in-out;
        text-shadow: 0 0 5px rgba(129, 140, 248, 0.3), 0 0 10px rgba(99, 102, 241, 0.2);
      }
       .light .statwox-title {
         background: linear-gradient(90deg, #4f46e5, #7c3aed);
         -webkit-background-clip: text;
         background-clip: text;
         animation: none;
         text-shadow: none;
       }


      @keyframes glow {
        from {
          text-shadow: 0 0 5px rgba(129, 140, 248, 0.3), 0 0 10px rgba(99, 102, 241, 0.2);
        }
        to {
          text-shadow: 0 0 15px rgba(129, 140, 248, 0.5), 0 0 25px rgba(99, 102, 241, 0.3);
        }
      }
    </style>
</head>
  <body>
    <div id="background-aurora">
      <div class="aurora-shape shape1"></div>
      <div class="aurora-shape shape2"></div>
      <div class="aurora-shape shape3"></div>
    </div>
    <div id="app"></div>
    <script src="/config.js"></script>
    <script type="module" src="/assets/index.js"></script>
  </body>
</html>
