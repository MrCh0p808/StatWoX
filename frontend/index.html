<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StatWoX - Forms & Surveys</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://rsms.me/inter/inter.css');
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap');

    html {
      font-family: 'Inter', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Poppins', sans-serif;
    }

    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #0f172a;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* --- Tactile Gradient Background (Dark Mode Only) --- */
    #background-aurora {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: #0f172a;
    }

    .aurora-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.8;
      transition: background 0.5s ease;
      will-change: transform;
    }

    .shape1 {
      background: rgba(79, 70, 229, 0.6);
      width: 60vw;
      height: 60vw;
      top: -20%;
      left: -20%;
      animation: move1 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .shape2 {
      background: rgba(139, 92, 246, 0.6);
      width: 50vw;
      height: 50vw;
      bottom: -10%;
      right: -10%;
      animation: move2 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .shape3 {
      background: rgba(20, 184, 166, 0.5);
      width: 40vw;
      height: 40vw;
      bottom: 40%;
      left: 30%;
      animation: move3 18s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes move1 {
      from {
        transform: translate(0, 0) rotate(0deg);
      }

      to {
        transform: translate(50px, 50px) rotate(10deg);
      }
    }

    @keyframes move2 {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(-50px, -30px) scale(1.1);
      }
    }

    @keyframes move3 {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(30px, -40px);
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="background-aurora">
    <div class="aurora-shape shape1"></div>
    <div class="aurora-shape shape2"></div>
    <div class="aurora-shape shape3"></div>
  </div>

  <div id="app"></div>
  <script src="/config.js"></script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
